<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Accounts | A Case for Wisdom · Admin</title>

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <style>
    /* Page-specific controls only — the shell + sidebar come from admin.css. */
    .admin-main { max-width: 880px; }
    .admin-section { border: 1px solid var(--color-rule); padding: var(--space-6); margin-bottom: var(--space-7); background: var(--admin-card-bg); }
    .admin-section h2 { font-family: var(--font-body); font-size: var(--text-md); margin: 0 0 var(--space-4); color: var(--color-green); }
    .account-form { display: grid; gap: var(--space-4); max-width: 420px; }
    .account-form .field { margin: 0; }
    .you-tag { font-size: var(--text-xs); color: var(--color-text-muted); margin-left: var(--space-2); }
    .toast { position: fixed; bottom: var(--space-6); right: var(--space-6); padding: var(--space-3) var(--space-5); background: var(--color-green); color: var(--color-cream); font-family: var(--font-body); font-size: var(--text-sm); opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
    .toast.is-on { opacity: 1; }
    .toast--err { background: #8a1a1a; }
  </style>
</head>

<body class="admin-app">

  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <svg class="admin-sidebar__logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
        <path d="M32 14 V50" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M32 22 Q24 24 22 32" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M32 22 Q40 24 42 32" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M14 50 Q22 46 32 50 T 50 50" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="admin-sidebar__brand-text">
        <span class="admin-sidebar__name">A Case for Wisdom</span>
        <span class="admin-sidebar__badge">Admin</span>
      </span>
    </div>

    <nav class="admin-nav" aria-label="Admin">
      <a class="admin-nav__link" href="/admin/"><span class="admin-nav__dot"></span>Dashboard</a>
      <a class="admin-nav__link" href="/admin/posts/"><span class="admin-nav__dot"></span>Posts</a>
      <a class="admin-nav__link" href="/admin/products/"><span class="admin-nav__dot"></span>Products</a>
      <a class="admin-nav__link" href="/admin/events/"><span class="admin-nav__dot"></span>Events</a>
      <a class="admin-nav__link is-active" href="/admin/admins/" aria-current="page"><span class="admin-nav__dot"></span>Admins</a>
      <a class="admin-nav__link" href="/admin/media/"><span class="admin-nav__dot"></span>Media</a>
      <a class="admin-nav__link" href="/admin/settings/"><span class="admin-nav__dot"></span>Settings</a>
    </nav>

    <div class="admin-sidebar__foot">
      <button type="button" class="admin-logout" id="logout-link">
        <span class="admin-nav__dot"></span>Log out
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-pagehead">
      <h1 class="admin-pagehead__title">Admin Accounts</h1>
    </div>

    <section class="admin-section" aria-labelledby="admins-heading">
      <h2 id="admins-heading">Existing admins</h2>
      <table class="admin-table">
        <thead>
          <tr>
            <th scope="col">Email</th>
            <th scope="col">Created</th>
            <th scope="col"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody id="admins-tbody">
          <tr class="admin-empty"><td colspan="3">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <section class="admin-section" aria-labelledby="add-heading">
      <h2 id="add-heading">Add admin</h2>
      <form class="account-form" id="add-form" autocomplete="off" novalidate>
        <label class="field">
          <span class="field__label">Email</span>
          <input class="input" type="email" name="email" id="f-email" autocomplete="off" required />
        </label>
        <label class="field">
          <span class="field__label">Password</span>
          <input class="input" type="password" name="password" id="f-password"
            autocomplete="new-password" minlength="8" required />
        </label>
        <label class="field">
          <span class="field__label">Confirm password</span>
          <input class="input" type="password" name="confirm" id="f-confirm"
            autocomplete="new-password" minlength="8" required />
        </label>
        <div>
          <button class="btn-admin-primary" type="submit" id="create-btn">Create Account</button>
        </div>
      </form>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { isAuthenticated, getSession, signOut } from "/assets/js/auth.js";
    import { adminListAdmins, adminRegister, adminDeleteAdmin } from "/assets/js/lib/api.js";

    // ── Auth guard (CLAUDE.md §11) ────────────────────────────────────────
    if (!(await isAuthenticated())) {
      window.location.replace("/admin/login.html");
    }

    // Identify the signed-in admin so they cannot delete their own account.
    const session = await getSession();
    const currentUserId = session?.user?.id ?? null;

    document.getElementById("logout-link").addEventListener("click", async () => {
      try { await signOut(); } catch {}
      window.location.replace("/admin/login.html");
    });

    const DATE_FMT = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "short", day: "numeric" });
    const toastEl = document.getElementById("toast");
    function toast(msg, isErr = false) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("toast--err", !!isErr);
      toastEl.classList.add("is-on");
      setTimeout(() => toastEl.classList.remove("is-on"), 2200);
    }

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    // ── Existing admins table ─────────────────────────────────────────────
    const tbody = document.getElementById("admins-tbody");

    function renderAdmins(admins) {
      if (!admins || !admins.length) {
        tbody.innerHTML = `<tr class="admin-empty"><td colspan="3">No admins yet.</td></tr>`;
        return;
      }
      tbody.innerHTML = admins.map((a) => {
        const isSelf = a.id === currentUserId;
        const created = a.created_at ? DATE_FMT.format(new Date(a.created_at)) : "—";
        const action = isSelf
          ? `<span class="you-tag">You</span>`
          : `<button type="button" class="btn-admin-danger btn-admin-sm" data-delete="${escapeHTML(a.id)}">Delete</button>`;
        return `
          <tr>
            <td>${escapeHTML(a.email)}</td>
            <td>${escapeHTML(created)}</td>
            <td>${action}</td>
          </tr>`;
      }).join("");

      tbody.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.delete;
          if (!confirm("Delete this admin account?")) return;
          btn.disabled = true;
          try {
            await adminDeleteAdmin(id);
            toast("Admin deleted");
            await loadAdmins();
          } catch (err) {
            toast(err.message || "Could not delete admin", true);
            btn.disabled = false;
          }
        });
      });
    }

    async function loadAdmins() {
      try {
        renderAdmins(await adminListAdmins());
      } catch (err) {
        tbody.innerHTML = `<tr class="admin-empty"><td colspan="3">Could not load admins.</td></tr>`;
        toast(err.message || "Could not load admins", true);
      }
    }

    // ── Add admin form ────────────────────────────────────────────────────
    const form    = document.getElementById("add-form");
    const createBtn = document.getElementById("create-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const email    = document.getElementById("f-email").value.trim();
      const password = document.getElementById("f-password").value;
      const confirm  = document.getElementById("f-confirm").value;

      if (!email) { toast("Email is required", true); return; }
      if (password.length < 8) { toast("Password must be at least 8 characters", true); return; }
      if (password !== confirm) { toast("Passwords do not match", true); return; }

      createBtn.disabled = true;
      createBtn.textContent = "Creating…";
      try {
        await adminRegister(email, password);
        toast("Admin created");
        form.reset();
        await loadAdmins();
      } catch (err) {
        toast(err.message || "Could not create admin", true);
      } finally {
        createBtn.disabled = false;
        createBtn.textContent = "Create Account";
      }
    });

    loadAdmins();
  </script>

</body>
</html>
