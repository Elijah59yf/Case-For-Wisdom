<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Edit event | A Case for Wisdom</title>

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />

  <!-- Quill rich text editor (CDN) -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>

<body>

  <header class="admin-topbar">
    <h1 class="admin-topbar__title">Edit event</h1>
    <div class="admin-topbar__actions">
      <a class="btn btn--ghost" id="view-event" href="#" target="_blank" rel="noopener" hidden>View event</a>
      <a class="btn btn--ghost" href="/admin/events/">Cancel</a>
    </div>
  </header>

  <main class="editor">

    <!-- Left: title + description editor -->
    <div class="editor__main">
      <input class="editor__title" type="text" id="title"
        placeholder="Event title" autocomplete="off" />
      <div class="editor__quill" id="editor"></div>
    </div>

    <!-- Right: metadata + actions -->
    <aside class="editor__sidebar">
      <h2 class="editor__sidebar-heading">Event details</h2>

      <label class="field">
        <span class="field__label">Status</span>
        <select class="select" id="status">
          <option value="draft" selected>Draft</option>
          <option value="published">Published</option>
        </select>
      </label>

      <label class="field">
        <span class="field__label">Event date &amp; time</span>
        <input class="input" type="datetime-local" id="event-date" />
      </label>

      <label class="field">
        <span class="field__label">End date &amp; time (optional)</span>
        <input class="input" type="datetime-local" id="end-date" />
      </label>

      <label class="field">
        <span class="field__label">Location name</span>
        <input class="input" type="text" id="location" autocomplete="off" />
      </label>

      <label class="field">
        <span class="field__label">Location URL (online link or map)</span>
        <input class="input" type="url" id="location-url" placeholder="https://" autocomplete="off" />
      </label>

      <div class="field">
        <span class="field__label">Type</span>
        <label class="checkbox-row"><input type="checkbox" id="is-online" /> <span>Online</span></label>
        <label class="checkbox-row"><input type="checkbox" id="is-inperson" /> <span>In Person</span></label>
      </div>

      <div class="field">
        <span class="field__label">Ticket type</span>
        <label class="checkbox-row"><input type="radio" name="paid" id="type-free" value="free" checked /> <span>Free</span></label>
        <label class="checkbox-row"><input type="radio" name="paid" id="type-paid" value="paid" /> <span>Paid</span></label>
      </div>

      <label class="field" id="price-field" hidden>
        <span class="field__label">Price (CAD)</span>
        <input class="input" type="number" id="price" min="0" step="0.01" placeholder="0.00" />
      </label>

      <div class="field">
        <span class="field__label">Capacity</span>
        <label class="checkbox-row"><input type="radio" name="cap" id="cap-unlimited" value="unlimited" checked /> <span>Unlimited</span></label>
        <label class="checkbox-row"><input type="radio" name="cap" id="cap-limited" value="limited" /> <span>Limited</span></label>
      </div>

      <label class="field" id="capacity-field" hidden>
        <span class="field__label">Max attendees</span>
        <input class="input" type="number" id="capacity" min="1" step="1" placeholder="e.g. 50" />
      </label>

      <div class="field">
        <span class="field__label">Registration</span>
        <label class="checkbox-row">
          <input type="checkbox" id="registration-open" />
          <span id="registration-open-label">Registration open</span>
        </label>
        <a class="btn btn--ghost" id="view-registrations" href="#" style="margin-top:8px;display:inline-block;">View registrations</a>
      </div>

      <div class="field">
        <span class="field__label">Cover image</span>
        <input class="cover-upload__input" type="file" id="cover" accept="image/*" />
        <img class="cover-preview" id="cover-preview" alt="Cover preview" hidden />
      </div>

      <div class="editor__actions">
        <button class="btn btn--primary" type="button" id="publish-btn">Publish</button>
        <button class="btn btn--ghost" type="button" id="draft-btn">Save Draft</button>
      </div>
    </aside>

  </main>

  <!-- Quill -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

  <script type="module">
    import { adminGetEvent, adminUpdateEvent, adminUploadFile, toggleEventRegistration } from "/assets/js/lib/api.js";
    import { isAuthenticated } from "/assets/js/auth.js";

    // ── Auth guard ──────────────────────────────────────────────────
    if (!(await isAuthenticated())) {
      window.location.replace("/admin/login.html");
    }

    // ── Event id from URL ───────────────────────────────────────────
    const eventId = new URLSearchParams(window.location.search).get("id");
    if (!eventId) { window.location.replace("/admin/events/"); }

    // ── Quill setup ─────────────────────────────────────────────────
    const quill = new Quill("#editor", {
      theme: "snow",
      placeholder: "Describe the event…",
      modules: {
        toolbar: [
          [{ header: [2, 3, false] }],
          ["bold", "italic", "underline"],
          ["blockquote"],
          [{ list: "ordered" }, { list: "bullet" }],
          ["link"],
        ],
      },
    });

    // ── Cover image preview ─────────────────────────────────────────
    const coverInput = document.getElementById("cover");
    const coverPreview = document.getElementById("cover-preview");
    let existingCover = null;

    coverInput.addEventListener("change", () => {
      const file = coverInput.files?.[0];
      if (!file) {
        if (existingCover) { coverPreview.src = existingCover; coverPreview.hidden = false; }
        else { coverPreview.hidden = true; coverPreview.removeAttribute("src"); }
        return;
      }
      coverPreview.src = URL.createObjectURL(file);
      coverPreview.hidden = false;
    });

    // ── Toast ───────────────────────────────────────────────────────
    let toastTimer;
    function toast(message, kind = "error") {
      clearTimeout(toastTimer);
      let el = document.querySelector(".toast");
      if (!el) {
        el = document.createElement("div");
        el.className = "toast";
        el.setAttribute("role", "alert");
        document.body.appendChild(el);
      }
      el.classList.toggle("toast--success", kind === "success");
      el.textContent = message;
      el.hidden = false;
      toastTimer = setTimeout(() => { el.hidden = true; }, 4000);
    }

    // ── Date helpers ────────────────────────────────────────────────
    // datetime-local "YYYY-MM-DDTHH:MM" → DB datetime "YYYY-MM-DD HH:MM:SS"
    function toDbDateTime(value) {
      if (!value) return null;
      const v = value.length === 16 ? `${value}:00` : value;
      return v.replace("T", " ");
    }
    // stored datetime → datetime-local value, in the browser's local zone.
    function toLocalInput(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ── Elements ────────────────────────────────────────────────────
    const titleInput = document.getElementById("title");
    const statusSelect = document.getElementById("status");
    const eventDateInput = document.getElementById("event-date");
    const endDateInput = document.getElementById("end-date");
    const locationInput = document.getElementById("location");
    const locationUrlInput = document.getElementById("location-url");
    const isOnlineInput = document.getElementById("is-online");
    const isInpersonInput = document.getElementById("is-inperson");
    const typePaid = document.getElementById("type-paid");
    const typeFree = document.getElementById("type-free");
    const priceField = document.getElementById("price-field");
    const priceInput = document.getElementById("price");
    const capLimited = document.getElementById("cap-limited");
    const capUnlimited = document.getElementById("cap-unlimited");
    const capacityField = document.getElementById("capacity-field");
    const capacityInput = document.getElementById("capacity");
    const regOpenInput = document.getElementById("registration-open");
    const regOpenLabel = document.getElementById("registration-open-label");
    const viewRegLink = document.getElementById("view-registrations");
    const publishBtn = document.getElementById("publish-btn");

    viewRegLink.href = `/admin/events/registrations.html?id=${encodeURIComponent(eventId)}`;

    function syncToggles() {
      priceField.hidden = !typePaid.checked;
      capacityField.hidden = !capLimited.checked;
    }
    [typePaid, typeFree, capLimited, capUnlimited].forEach((el) => el.addEventListener("change", syncToggles));

    // Registration open/close is a live action (not part of Save).
    regOpenInput.addEventListener("change", async () => {
      regOpenInput.disabled = true;
      try {
        const { registration_open } = await toggleEventRegistration(eventId);
        regOpenInput.checked = registration_open;
        regOpenLabel.textContent = registration_open ? "Registration open" : "Registration closed";
      } catch (err) {
        regOpenInput.checked = !regOpenInput.checked; // revert
        toast(err?.message || "Could not update registration state.");
      } finally {
        regOpenInput.disabled = false;
      }
    });
    const draftBtn = document.getElementById("draft-btn");
    const viewLink = document.getElementById("view-event");

    function setBusy(busy) {
      publishBtn.disabled = busy;
      draftBtn.disabled = busy;
    }

    // ── Load + prefill ──────────────────────────────────────────────
    (async function load() {
      setBusy(true);
      try {
        const ev = await adminGetEvent(eventId);
        titleInput.value = ev.title || "";
        statusSelect.value = ev.published ? "published" : "draft";
        eventDateInput.value = toLocalInput(ev.event_date);
        endDateInput.value = toLocalInput(ev.end_date);
        locationInput.value = ev.location || "";
        locationUrlInput.value = ev.location_url || "";
        isOnlineInput.checked = !!ev.is_online;
        isInpersonInput.checked = !!ev.is_inperson;

        const paid = !!ev.is_paid;
        typePaid.checked = paid;
        typeFree.checked = !paid;
        priceInput.value = paid && ev.price ? Number(ev.price).toFixed(2) : "";

        const limited = ev.capacity != null;
        capLimited.checked = limited;
        capUnlimited.checked = !limited;
        capacityInput.value = limited ? ev.capacity : "";

        const open = ev.registration_open !== false;
        regOpenInput.checked = open;
        regOpenLabel.textContent = open ? "Registration open" : "Registration closed";
        syncToggles();

        if (ev.description) quill.root.innerHTML = ev.description;

        existingCover = ev.cover_url || null;
        if (existingCover) { coverPreview.src = existingCover; coverPreview.hidden = false; }

        if (ev.slug) {
          viewLink.href = `/event.html?slug=${encodeURIComponent(ev.slug)}`;
          viewLink.hidden = false;
        }
      } catch (err) {
        toast(err?.message || "Could not load the event.");
      } finally {
        setBusy(false);
      }
    })();

    // ── Save (update) ───────────────────────────────────────────────
    async function save(published) {
      const title = titleInput.value.trim();
      const descriptionText = quill.getText().trim();
      const description = descriptionText ? quill.root.innerHTML : null;
      const eventDate = toDbDateTime(eventDateInput.value);

      const isPaid = typePaid.checked;
      const price = isPaid ? (parseFloat(priceInput.value) || 0) : 0;
      const capacity = capLimited.checked ? (parseInt(capacityInput.value, 10) || null) : null;

      if (!title) { toast("A title is required."); return; }
      if (!eventDate) { toast("An event date is required."); return; }
      if (isPaid && price <= 0) { toast("Enter a price for a paid event."); return; }
      if (capLimited.checked && (!capacity || capacity < 1)) { toast("Enter a max attendee count."); return; }

      setBusy(true);
      try {
        let cover_url = existingCover;
        const file = coverInput.files?.[0];
        if (file) {
          const { url } = await adminUploadFile(file);
          cover_url = url;
        }

        const payload = {
          title,
          description,
          event_date: eventDate,
          end_date: toDbDateTime(endDateInput.value),
          location: locationInput.value.trim() || null,
          location_url: locationUrlInput.value.trim() || null,
          is_online: isOnlineInput.checked,
          is_inperson: isInpersonInput.checked,
          is_paid: isPaid,
          price,
          capacity,
          cover_url,
          published,
        };

        await adminUpdateEvent(eventId, payload);
        window.location.assign("/admin/events/");
      } catch (err) {
        toast(err?.message || "Could not save the event.");
        setBusy(false);
      }
    }

    publishBtn.addEventListener("click", () => save(true));
    draftBtn.addEventListener("click", () => save(false));
  </script>

</body>
</html>
