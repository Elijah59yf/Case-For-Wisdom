<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Events | A Case for Wisdom · Admin</title>

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />

  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>

<body class="admin-app">

  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <svg class="admin-sidebar__logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
        <path d="M32 14 V50" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M32 22 Q24 24 22 32" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M32 22 Q40 24 42 32" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M14 50 Q22 46 32 50 T 50 50" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="admin-sidebar__brand-text">
        <span class="admin-sidebar__name">A Case for Wisdom</span>
        <span class="admin-sidebar__badge">Admin</span>
      </span>
    </div>

    <nav class="admin-nav" aria-label="Admin">
      <a class="admin-nav__link" href="/admin/"><span class="admin-nav__dot"></span>Dashboard</a>
      <a class="admin-nav__link" href="/admin/posts/"><span class="admin-nav__dot"></span>Posts</a>
      <a class="admin-nav__link" href="/admin/products/"><span class="admin-nav__dot"></span>Products</a>
      <a class="admin-nav__link is-active" href="/admin/events/" aria-current="page"><span class="admin-nav__dot"></span>Events</a>
      <a class="admin-nav__link" href="/admin/admins/"><span class="admin-nav__dot"></span>Admins</a>
      <a class="admin-nav__link" href="/admin/media/"><span class="admin-nav__dot"></span>Media</a>
      <a class="admin-nav__link" href="/admin/settings/"><span class="admin-nav__dot"></span>Settings</a>
    </nav>

    <div class="admin-sidebar__foot">
      <button type="button" class="admin-logout" id="logout-link">
        <span class="admin-nav__dot"></span>Log out
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-pagehead">
      <h1 class="admin-pagehead__title">Events</h1>
      <div class="admin-pagehead__actions">
        <a class="btn-admin-primary" href="/admin/events/new.html">New Event</a>
      </div>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th scope="col">Title</th>
          <th scope="col">Date</th>
          <th scope="col">Type</th>
          <th scope="col">Status</th>
          <th scope="col"><span class="sr-only">Actions</span></th>
        </tr>
      </thead>
      <tbody id="events-body">
        <tr><td><span class="sk sk-line"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td></tr>
        <tr><td><span class="sk sk-line"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td></tr>
        <tr><td><span class="sk sk-line"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td><td><span class="sk sk-line sk-line--sm"></span></td></tr>
      </tbody>
    </table>
  </main>

  <script type="module">
    import { isAuthenticated, signOut } from "/assets/js/auth.js";
    import { adminGetEvents, adminUpdateEvent, adminDeleteEvent } from "/assets/js/lib/api.js";

    // ── Auth guard ──────────────────────────────────────────────────
    if (!(await isAuthenticated())) {
      window.location.replace("/admin/login.html");
    }

    document.getElementById("logout-link").addEventListener("click", async () => {
      try { await signOut(); } catch {}
      window.location.replace("/admin/login.html");
    });

    const tbody = document.getElementById("events-body");
    const DATE_FMT = new Intl.DateTimeFormat("en-CA", {
      year: "numeric", month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
    });

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function typeLabel(ev) {
      if (ev.is_online && ev.is_inperson) return "Both";
      if (ev.is_online) return "Online";
      if (ev.is_inperson) return "In Person";
      return "—";
    }

    function showEmpty() {
      tbody.innerHTML = `<tr class="admin-empty"><td colspan="5">No events yet.</td></tr>`;
    }

    function badgeHTML(published) {
      return published
        ? `<span class="badge badge--published">Published</span>`
        : `<span class="badge badge--draft">Draft</span>`;
    }

    function rowHTML(ev) {
      const published = !!ev.published;
      const date = ev.event_date ? DATE_FMT.format(new Date(ev.event_date)) : "—";
      const toggleLabel = published ? "Unpublish" : "Publish";
      return `
        <td>${escapeHTML(ev.title || "(untitled)")}</td>
        <td>${escapeHTML(date)}</td>
        <td>${escapeHTML(typeLabel(ev))}</td>
        <td data-cell="status">${badgeHTML(published)}</td>
        <td>
          <div class="admin-table__actions">
            <a class="btn-admin-ghost btn-admin-sm" href="/admin/events/edit.html?id=${encodeURIComponent(ev.id)}">Edit</a>
            <a class="btn-admin-ghost btn-admin-sm" href="/admin/events/registrations.html?id=${encodeURIComponent(ev.id)}">Registrations</a>
            <button type="button" class="btn-admin-ghost btn-admin-sm" data-action="toggle">${toggleLabel}</button>
            <button type="button" class="btn-admin-danger btn-admin-sm" data-action="delete">Delete</button>
          </div>
        </td>`;
    }

    function makeRow(ev) {
      const tr = document.createElement("tr");
      tr.dataset.id = ev.id;
      tr.dataset.published = String(!!ev.published);
      tr.innerHTML = rowHTML(ev);
      tr.querySelector('[data-action="toggle"]').addEventListener("click", (e) => toggle(tr, e.currentTarget));
      tr.querySelector('[data-action="delete"]').addEventListener("click", (e) => remove(tr, e.currentTarget));
      return tr;
    }

    async function toggle(tr, btn) {
      const next = tr.dataset.published !== "true";
      const original = btn.textContent;
      btn.disabled = true;
      try {
        await adminUpdateEvent(tr.dataset.id, { published: next });
        tr.dataset.published = String(next);
        tr.querySelector('[data-cell="status"]').innerHTML = badgeHTML(next);
        btn.textContent = next ? "Unpublish" : "Publish";
      } catch (err) {
        alert(err?.message || "Could not update the event.");
        btn.textContent = original;
      } finally {
        btn.disabled = false;
      }
    }

    async function remove(tr, btn) {
      const title = tr.querySelector("td")?.textContent || "this event";
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      btn.disabled = true;
      try {
        await adminDeleteEvent(tr.dataset.id);
        tr.remove();
        if (!tbody.querySelector("tr[data-id]")) showEmpty();
      } catch (err) {
        alert(err?.message || "Could not delete the event.");
        btn.disabled = false;
      }
    }

    (async function init() {
      try {
        const res = await adminGetEvents();
        const events = Array.isArray(res) ? res : (Array.isArray(res?.data) ? res.data : []);
        if (!events.length) { showEmpty(); return; }
        tbody.replaceChildren(...events.map(makeRow));
      } catch (err) {
        console.error("[events] load failed", err);
        tbody.innerHTML = `<tr class="admin-empty"><td colspan="5">Could not load events. Please refresh.</td></tr>`;
      }
    })();
  </script>

</body>
</html>
