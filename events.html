  <!-- Mobile drawer toggle -->
  <script type="module">

    const toggle = document.querySelector("[data-nav-toggle]");
    const drawer = document.getElementById("mobile-drawer");
    if (toggle && drawer) {

        drawer.setAttribute("aria-hidden", String(open));
        toggle.setAttribute("aria-expanded", String(!open));

  <!-- Events listing logic -->
  <script type="module">
    import { loadNav, loadFooter, loadSettings } from "/assets/js/site.js";
    import { getEvents, getPastEvents } from "/assets/js/lib/api.js";

    const DATE_FMT = new Intl.DateTimeFormat("en-US", { year: "numeric", month: "long", day: "numeric" });
    const TIME_FMT = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true });

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    // "June 10, 2026 · 7:00 PM"
    function formatWhen(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return `${DATE_FMT.format(d)} · ${TIME_FMT.format(d)}`;
    }

    // Plain-text excerpt from the stored (HTML) description.
    function excerpt(html) {
      const text = String(html || "").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
      return text;
    }

    // { dotClass, label } for the online/in-person/both badge.
    function eventType(ev) {
      if (ev.is_online && ev.is_inperson) return { dotClass: "event-type-dot--both", label: "Both" };
      if (ev.is_online) return { dotClass: "event-type-dot--online", label: "Online" };
      if (ev.is_inperson) return { dotClass: "event-type-dot--inperson", label: "In Person" };
      return null;
    }

    function eventItem(ev) {
      const li = document.createElement("li");
      li.className = "event-item";

      const type = eventType(ev);
      const meta = [];
      const when = formatWhen(ev.event_date);
      if (when) meta.push(`<span>${escapeHTML(when)}</span>`);
      if (type) {
        meta.push(
          `<span class="event-type"><span class="event-type-dot ${type.dotClass}" aria-hidden="true"></span>${escapeHTML(type.label)}</span>`
        );
      }
      if (ev.is_inperson && ev.location) meta.push(`<span>${escapeHTML(ev.location)}</span>`);

      const desc = excerpt(ev.description);
      const register = ev.location_url
        ? `<a class="event-link" href="${escapeHTML(ev.location_url)}" target="_blank" rel="noopener">${ev.is_online ? "Join" : "Register"}</a>`
        : "";

      li.innerHTML = `
        <div class="event-content">
          <div class="event-meta">${meta.join('<span aria-hidden="true">·</span>')}</div>
          <a class="event-title" href="/event.html?slug=${encodeURIComponent(ev.slug)}">${escapeHTML(ev.title)}</a>
          ${desc ? `<p class="event-excerpt">${escapeHTML(desc)}</p>` : ""}
          ${register}
        </div>
        ${ev.cover_url ? `<img class="event-thumb" src="${escapeHTML(ev.cover_url)}" alt="" loading="lazy" decoding="async" />` : ""}
      `;
      return li;
    }

    function emptyState() {
      const li = document.createElement("li");
      li.className = "events-empty";
      li.textContent = "No upcoming events.";
      return li;
    }

    async function load() {
      const list = document.querySelector("[data-events-list]");
      const pastBlock = document.querySelector("[data-past-block]");
      const pastList = document.querySelector("[data-past-list]");
      const pastToggle = document.querySelector("[data-past-toggle]");

      const controller = new AbortController();
      window.addEventListener("pagehide", () => controller.abort(), { once: true });

      let events;
      try {
        events = await getEvents({ limit: 100 }, { signal: controller.signal });
      } catch (err) {
        if (err?.name === "AbortError") return;
        console.error("[events] failed to load", err);
        list.replaceChildren(emptyState());
        return;
      }

      events = Array.isArray(events) ? events : [];

      // getEvents already returns future + today, soonest-first. Filter defensively
      // so anything that has slipped into the past doesn't show as upcoming.
      const startOfToday = new Date();
      startOfToday.setHours(0, 0, 0, 0);
      const upcoming = events.filter((e) => new Date(e.event_date) >= startOfToday);

      if (!upcoming.length) list.replaceChildren(emptyState());
      else list.replaceChildren(...upcoming.map(eventItem));

      // Past events are loaded lazily — only fetched on the first expansion of
      // the toggle (getPastEvents → published events with event_date < now).
      pastBlock.hidden = false;
      let pastLoaded = false;
      pastToggle.addEventListener("click", async () => {
        const open = pastToggle.getAttribute("aria-expanded") === "true";

        if (!open && !pastLoaded) {
          pastLoaded = true;
          pastToggle.disabled = true;
          try {
            let past = await getPastEvents({ signal: controller.signal });
            past = Array.isArray(past) ? past : [];
            if (past.length) {
              pastList.replaceChildren(...past.map(eventItem));
            } else {
              const li = document.createElement("li");
              li.className = "events-empty";
              li.textContent = "No past events.";
              pastList.replaceChildren(li);
            }
          } catch (err) {
            if (err?.name === "AbortError") { pastToggle.disabled = false; return; }
            pastLoaded = false; // allow a retry on next click
            console.error("[events] failed to load past events", err);
            const li = document.createElement("li");
            li.className = "events-empty";
            li.textContent = "Couldn’t load past events.";
            pastList.replaceChildren(li);
          } finally {
            pastToggle.disabled = false;
          }
        }

        pastToggle.setAttribute("aria-expanded", String(!open));
        pastToggle.textContent = open ? "View past events" : "Hide past events";
        pastList.hidden = open;
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadNav();
      loadSettings();
      loadFooter();
      load();
    });
  </script>
