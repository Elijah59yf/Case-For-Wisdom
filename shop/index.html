  <!-- Mobile drawer + reveal observer -->
  <script type="module">
    document.querySelector("[data-year]").textContent = new Date().getFullYear();

    const toggle = document.querySelector("[data-nav-toggle]");
    const drawer = document.getElementById("mobile-drawer");
    if (toggle && drawer) {
      toggle.addEventListener("click", () => {
        const open = drawer.getAttribute("data-open") === "true";
        drawer.setAttribute("data-open", String(!open));
        drawer.setAttribute("aria-hidden", String(open));
        toggle.setAttribute("aria-expanded", String(!open));
      });
    }

    window.__revealObserve = (root = document) => {
      const reveals = root.querySelectorAll(".reveal:not(.is-visible)");
      if ("IntersectionObserver" in window && reveals.length) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              io.unobserve(entry.target);
            }
          });
        }, { rootMargin: "0px 0px -10% 0px", threshold: 0.05 });
        reveals.forEach((el) => io.observe(el));
      } else {
        reveals.forEach((el) => el.classList.add("is-visible"));
      }
    };
    window.__revealObserve();
  </script>

  <!-- Shop logic -->
  <script type="module">
    import { loadNav, loadFooter, loadSettings } from "/assets/js/site.js";
    import { getProducts } from "/assets/js/lib/api.js";
    import { addToCart } from "/assets/js/cart.js";

    const PRICE_FMT = new Intl.NumberFormat("en-CA", { style: "currency", currency: "CAD" });
    const RADIUS = ["shop-item--radius-a", "shop-item--radius-b"];

    const WATERMARK = `
      <svg class="shop-item__watermark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M32 14 V50" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M32 24 Q24 26 22 34" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M32 24 Q40 26 42 34" stroke="currentColor" stroke-width="1.25" fill="none"/>
      </svg>`;

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function card(product, index) {
      const href = `/shop/product.html?id=${encodeURIComponent(product.id)}`;
      const cover = product.images?.[0];
      const radius = RADIUS[index % RADIUS.length];

      const article = document.createElement("article");
      article.className = `shop-item ${radius} reveal`;

      const media = cover
        ? `<div class="shop-item__media"><img src="${escapeHTML(cover)}" alt="" loading="lazy" /></div>`
        : `<div class="shop-item__media shop-item__media--empty">${WATERMARK}</div>`;

      article.innerHTML = `
        <p class="shop-item__category">${escapeHTML(product.category || "Object")}</p>
        <a class="shop-item__link" href="${href}">
          ${media}
          <h2 class="shop-item__name">${escapeHTML(product.name || "Untitled")}</h2>
          <p class="shop-item__price">${PRICE_FMT.format(Number(product.price) || 0)}</p>
        </a>
        <div class="shop-item__foot">
          <button type="button" class="btn btn--ghost" data-add>Add to cart</button>
        </div>`;

      article.querySelector("[data-add]").addEventListener("click", (e) => {
        addToCart(product, 1);
        const btn = e.currentTarget;
        btn.textContent = "Added ✓";
        btn.disabled = true;
        setTimeout(() => { btn.textContent = "Add to cart"; btn.disabled = false; }, 1400);
      });

      return article;
    }

    function showEmpty(grid) {
      grid.innerHTML = `
        <div class="shop-empty reveal is-visible">
          <p class="shop-empty__headline"><em>Objects coming soon.</em></p>
          <p class="shop-empty__sub">A small shelf is being prepared.</p>
        </div>`;
    }

    async function renderShop(grid) {
      try {
        const res = await getProducts();
        const products = Array.isArray(res) ? res : (Array.isArray(res?.data) ? res.data : []);
        if (!products.length) { showEmpty(grid); return; }
        grid.replaceChildren(...products.map(card));
        window.__revealObserve(grid);
      } catch (err) {
        console.error("[shop] failed to load products", err);
        grid.innerHTML = `<p class="alert alert--error">The shelf is being tidied — please try again shortly.</p>`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadNav();
      loadSettings();
      loadFooter();
      renderShop(document.querySelector("[data-shop-grid]"));
    });
  </script>
