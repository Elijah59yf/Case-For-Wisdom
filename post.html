<body>

          <path d="M32 22 Q40 24 42 32" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M32 30 Q26 32 24 40" stroke="currentColor" stroke-width="1" fill="none"/>

  <!-- ============================================================
       POST
       ============================================================ -->
  <main id="post-main">
    <div class="post-loading" data-loading aria-hidden="true">
      <div class="skeleton skeleton-line skeleton-line--sm" style="margin-bottom: var(--space-4);"></div>
      <div class="skeleton skeleton-line skeleton-line--title" style="height: 2.4rem; width: 70%; margin-bottom: var(--space-3);"></div>
      <div class="skeleton skeleton-line skeleton-line--wide" style="margin-bottom: var(--space-6);"></div>
      <div class="skeleton skeleton-card__media" style="margin-bottom: var(--space-6);"></div>
      <div class="skeleton skeleton-line skeleton-line--wide" style="margin-bottom: var(--space-3);"></div>
      <div class="skeleton skeleton-line skeleton-line--wide" style="margin-bottom: var(--space-3);"></div>
      <div class="skeleton skeleton-line skeleton-line--mid"></div>
    </div>
  </main>

  <!-- ============================================================
       NEWSLETTER
       ============================================================ -->
  <section class="newsletter-section" aria-labelledby="newsletter-heading">
    <h2 class="newsletter-section__heading" id="newsletter-heading">Get new essays by email</h2>
    <p class="newsletter-section__sub">No spam. Unsubscribe anytime.</p>
    <form class="newsletter-section__form" data-newsletter novalidate>
      <label class="sr-only" for="newsletter-email">Email address</label>
      <input
        type="email"
        id="newsletter-email"
        class="newsletter-section__input"
        name="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
        data-newsletter-input
      />
      <button type="submit" class="btn btn--ghost" data-newsletter-btn>Subscribe</button>
    </form>
    <p class="newsletter-section__msg" data-newsletter-msg role="status" aria-live="polite"></p>
  </section>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand-block">
        <div class="footer__brand" data-site-name></div>
        <p class="footer__tagline" data-footer-tagline></p>
      </div>
      <nav class="footer__links" aria-label="Footer">
        <a class="footer__link" href="/">Journal</a>
        <a class="footer__link" href="/about.html">About</a>
        <a class="footer__link" href="/shop/">Shop</a>
        <a class="footer__link" data-social="instagram" href="#" rel="noopener" hidden>Instagram</a>
      </nav>
    </div>
    <div class="footer__bottom">
      <span>© <span data-year>2026</span> <span data-site-name></span> — <span data-footer-copy></span></span>
      <span>All prices in CAD.</span>
    </div>
  </footer>

  <!-- Mobile drawer toggle -->
  <script type="module">
    const toggle = document.querySelector("[data-nav-toggle]");
    const drawer = document.getElementById("mobile-drawer");
    if (toggle && drawer) {
      toggle.addEventListener("click", () => {
        const open = drawer.getAttribute("data-open") === "true";
        drawer.setAttribute("data-open", String(!open));
        drawer.setAttribute("aria-hidden", String(open));
        toggle.setAttribute("aria-expanded", String(!open));
      });
    }
  </script>

  <!-- Single post logic -->
  <script type="module">
    import { loadNav, loadFooter } from "/assets/js/site.js";
    import { getPostBySlug, getPosts, subscribe, ApiError } from "/assets/js/lib/api.js";

    const DATE_FMT = new Intl.DateTimeFormat("en-CA", {
      year: "numeric", month: "long", day: "numeric",
    });

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function readTime(post) {
      if (Number.isFinite(post.read_time)) return post.read_time;
      const text = (post.body || "").replace(/<[^>]*>/g, " ");
      const words = text.split(/\s+/).filter(Boolean).length;
      return Math.max(1, Math.round(words / 220));
    }

    function renderPost(post) {
      const category = post.category || "Essay";
      const date = post.created_at ? DATE_FMT.format(new Date(post.created_at)) : "";
      const meta = [date, category, `${readTime(post)} min read`].filter(Boolean).join(" · ");

      const cover = post.cover_url
        ? `<img class="post-cover" src="${escapeHTML(post.cover_url)}" alt="Cover image for “${escapeHTML(post.title)}”" decoding="async" />`
        : "";

      const main = document.getElementById("post-main");
      main.innerHTML = `
        <article class="post-page">
          <header class="post-header">
            <div class="post-meta">${escapeHTML(meta)}</div>
            <h1 class="post-title">${escapeHTML(post.title)}</h1>
            ${post.excerpt ? `<p class="post-excerpt">${escapeHTML(post.excerpt)}</p>` : ""}
          </header>
          ${cover}
          <div class="post-body prose"></div>
          <footer class="post-footer">
            <a href="/" class="post-back">← Back to the journal</a>
            <div class="post-share">
              <button type="button" class="share-btn" data-share="copy">Copy link</button>
              <button type="button" class="share-btn" data-share="instagram"
                title="Link copied — paste in your Instagram story or bio">Share on Instagram</button>
              <span class="post-share__status" data-share-status></span>
            </div>
          </footer>
        </article>
      `;
      // Body is stored as HTML from Quill — inject as innerHTML.
      main.querySelector(".post-body").innerHTML = post.body || "";

      wireShare(main);

      document.title = `${post.title} | A Case for Wisdom`;
    }

    // Copy link / share buttons. Instagram has no web share API, so it just
    // copies the link and hints where to paste it.
    function wireShare(root) {
      const status = root.querySelector("[data-share-status]");
      let timer;
      const flash = (text) => {
        if (!status) return;
        status.textContent = text;
        clearTimeout(timer);
        timer = setTimeout(() => { status.textContent = ""; }, text.length > 20 ? 4000 : 2000);
      };
      const copyLink = async () => {
        try {
          await navigator.clipboard.writeText(window.location.href);
          return true;
        } catch {
          return false;
        }
      };
      root.querySelector('[data-share="copy"]')?.addEventListener("click", async () => {
        flash(await copyLink() ? "Copied!" : "Press Ctrl/Cmd+C to copy.");
      });
      root.querySelector('[data-share="instagram"]')?.addEventListener("click", async () => {
        const ok = await copyLink();
        flash(ok
          ? "Link copied — paste in your Instagram story or bio."
          : "Press Ctrl/Cmd+C to copy the link.");
      });
    }

    // ── Related posts ───────────────────────────────────────────────
    function relatedItem(post) {
      const category = post.category || "Essay";
      const date = post.created_at ? DATE_FMT.format(new Date(post.created_at)) : "";
      const meta = [date, category].filter(Boolean).join(" · ");
      return `
        <li class="article-item article-item--compact">
          <div class="article-content">
            <div class="article-meta">${escapeHTML(meta)}</div>
            <a class="article-title" href="/post.html?slug=${encodeURIComponent(post.slug)}">${escapeHTML(post.title)}</a>
          </div>
        </li>
      `;
    }

    async function renderRelated(post) {
      if (!post.category) return;
      let related;
      try {
        const result = await getPosts({ category: post.category, limit: 4 });
        related = Array.isArray(result?.data) ? result.data : Array.isArray(result) ? result : [];
      } catch (err) {
        console.error("[post] failed to fetch related posts", err);
        return; // related posts are non-essential — fail quietly
      }

      const others = related.filter((p) => p.slug !== post.slug).slice(0, 3);
      if (!others.length) return;

      const section = document.createElement("section");
      section.className = "related";
      section.setAttribute("aria-labelledby", "related-heading");
      section.innerHTML = `
        <h2 class="related__heading" id="related-heading">More essays</h2>
        <ul class="article-list">${others.map(relatedItem).join("")}</ul>
      `;
      document.getElementById("post-main").appendChild(section);
    }

    function renderMessage({ headline, sub, showRetry }) {
      const main = document.getElementById("post-main");
      main.innerHTML = `
        <div class="post-page">
          <div class="posts-empty" role="alert">
            <p class="posts-empty__headline">${escapeHTML(headline)}</p>
            <p class="posts-empty__sub">${escapeHTML(sub)}</p>
          </div>
          <div class="post-footer">
            ${showRetry ? `<button type="button" class="post-back" data-retry>Try again</button>` : "<span></span>"}
            <a href="/" class="post-back">← Back to the journal</a>
          </div>
        </div>
      `;
      const retry = main.querySelector("[data-retry]");
      if (retry) retry.addEventListener("click", () => load());
    }

    let slug;
    async function load() {
      // Cancel the fetch if the reader navigates away before it resolves.
      const controller = new AbortController();
      window.addEventListener("pagehide", () => controller.abort(), { once: true });

      let post;
      try {
        post = await getPostBySlug(slug, { signal: controller.signal });
      } catch (err) {
        if (err?.name === "AbortError") return; // navigated away
        // A genuine 404 means the essay doesn't exist; anything else is a
        // transient connectivity/server problem we can retry.
        if (err instanceof ApiError && err.status === 404) {
          renderMessage({
            headline: "This essay couldn't be found.",
            sub: "It may have been moved or unpublished.",
            showRetry: false,
          });
          return;
        }
        console.error("[post] failed to fetch post", err);
        renderMessage({
          headline: "We couldn't load this essay.",
          sub: "There was a problem reaching the journal. Please try again in a moment.",
          showRetry: true,
        });
        return;
      }

      if (!post || !post.title) {
        renderMessage({
          headline: "This essay couldn't be found.",
          sub: "It may have been moved or unpublished.",
          showRetry: false,
        });
        return;
      }

      renderPost(post);
      renderRelated(post);
    }

    // ── Newsletter signup ───────────────────────────────────────────
    function wireNewsletter() {
      const form = document.querySelector("[data-newsletter]");
      if (!form) return;
      const input = form.querySelector("[data-newsletter-input]");
      const btn = form.querySelector("[data-newsletter-btn]");
      const msg = document.querySelector("[data-newsletter-msg]");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = (input.value || "").trim();
        msg.classList.remove("is-error");
        if (!email || !input.checkValidity()) {
          msg.textContent = "Please enter a valid email address.";
          msg.classList.add("is-error");
          return;
        }
        btn.disabled = true;
        try {
          await subscribe(email);
          form.hidden = true;
          msg.textContent = "Thank you. Watch your inbox.";
        } catch (err) {
          btn.disabled = false;
          msg.textContent = "Something went wrong — please try again in a moment.";
          msg.classList.add("is-error");
        }
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      document.querySelectorAll("[data-year]").forEach((el) => { el.textContent = new Date().getFullYear(); });
      loadNav();
      loadFooter();
      wireNewsletter();

      slug = new URLSearchParams(window.location.search).get("slug");
      if (!slug) {
        window.location.href = "/";
        return;
      }

      load();
    });
  </script>

</body>
