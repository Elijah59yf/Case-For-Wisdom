<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2B3E1E" />

  <title>Cart — A Case for Wisdom</title>
  <meta name="description" content="Your cart at A Case for Wisdom. All prices in CAD." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Stripe publishable key (public). Cloudflare injects this per page; on the
       VPS it is inlined or served from /api/settings. Safe to expose. -->
  <meta name="stripe-publishable" content="" />

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/global.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/shop.css" />
</head>

<body class="shop-page">

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ============================================================
       NAV
       ============================================================ -->
  <header class="nav" role="banner">
    <div class="nav__inner">
      <a class="nav__brand" href="/" aria-label="A Case for Wisdom — Home">
        <svg class="nav__logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.25" opacity="0.55"/>
          <path d="M32 14 V50" stroke="currentColor" stroke-width="1.25" fill="none"/>
          <path d="M32 22 Q24 24 22 32" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M32 22 Q40 24 42 32" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M14 50 Q22 46 32 50 T 50 50" stroke="#B8953A" stroke-width="1.25" fill="none"/>
        </svg>
        <span class="nav__brand-text" data-site-name></span>
      </a>

      <nav class="nav__links" aria-label="Primary" data-nav-links></nav>

      <div class="nav__actions">
        <a class="nav__cart" href="/cart/" aria-label="Cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M3 5h2l2.4 11.2A2 2 0 0 0 9.36 18h8.28a2 2 0 0 0 1.96-1.6L21 9H6"/>
            <circle cx="10" cy="21" r="1.2"/>
            <circle cx="18" cy="21" r="1.2"/>
          </svg>
          <span class="nav__cart-count" data-cart-count hidden>0</span>
        </a>

        <button class="nav__toggle" type="button" aria-expanded="false" aria-controls="mobile-drawer" data-nav-toggle>
          <span class="sr-only">Open menu</span>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="nav__drawer" id="mobile-drawer" data-open="false" aria-hidden="true">
      <a class="nav__link" href="/cart/">Cart</a>
    </div>
  </header>

  <main id="main">
    <section class="cart">
      <div class="cart-head">
        <p class="cart-head__eyebrow">Cart</p>
        <h1 class="cart-head__title">Your <em>cart</em>.</h1>
      </div>

      <div data-cart-root>
        <!-- populated by script: either .cart-layout or .cart-empty -->
      </div>
    </section>
  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div>
        <div class="footer__brand" data-site-name></div>
        <p class="footer__tagline" data-footer-tagline></p>
      </div>
      <div>
        <p class="footer__heading">Read</p>
        <div class="footer__list">
          <a class="footer__link" href="/">Journal</a>
          <a class="footer__link" href="/about.html">About</a>
        </div>
      </div>
      <div>
        <p class="footer__heading">Shop</p>
        <div class="footer__list">
          <a class="footer__link" href="/shop/">All products</a>
          <a class="footer__link" href="/cart/">Cart</a>
        </div>
      </div>
      <div>
        <p class="footer__heading">Elsewhere</p>
        <div class="footer__list">
          <a class="footer__link" data-social="instagram" href="#" rel="noopener" hidden>Instagram</a>
          <a class="footer__link" data-social="substack" href="#" rel="noopener" hidden>Substack</a>
          <a class="footer__link" href="mailto:hello@acaseforwisdom.com">Write</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <span>© <span data-year>2026</span> <span data-site-name></span> — <span data-footer-copy></span></span>
      <span>All prices in CAD.</span>
    </div>
  </footer>

  <!-- Mobile drawer -->
  <script type="module">
    document.querySelector("[data-year]").textContent = new Date().getFullYear();
    const toggle = document.querySelector("[data-nav-toggle]");
    const drawer = document.getElementById("mobile-drawer");
    if (toggle && drawer) {
      toggle.addEventListener("click", () => {
        const open = drawer.getAttribute("data-open") === "true";
        drawer.setAttribute("data-open", String(!open));
        drawer.setAttribute("aria-hidden", String(open));
        toggle.setAttribute("aria-expanded", String(!open));
      });
    }
  </script>

  <!-- Cart logic -->
  <script type="module">
    import { loadNav, loadFooter, loadSettings } from "/assets/js/site.js";
    import { getCart, updateQty, removeFromCart, getCartTotal } from "/assets/js/cart.js";
    import { initCheckout } from "/assets/js/checkout.js";

    const PRICE_FMT = new Intl.NumberFormat("en-CA", { style: "currency", currency: "CAD" });
    const root = document.querySelector("[data-cart-root]");

    function escapeHTML(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function renderEmpty() {
      root.innerHTML = `
        <div class="cart-empty">
          <p class="cart-empty__headline">Your cart is empty.</p>
          <a class="btn btn--primary" href="/shop/">Visit the shop</a>
        </div>`;
    }

    function itemRow(line) {
      const media = line.image
        ? `<div class="cart-item__media"><img src="${escapeHTML(line.image)}" alt="" /></div>`
        : `<div class="cart-item__media"></div>`;
      const lineTotal = PRICE_FMT.format(line.price * line.qty);
      return `
        ${media}
        <div class="cart-item__body">
          <h2 class="cart-item__name"><a href="/shop/product.html?id=${encodeURIComponent(line.id)}">${escapeHTML(line.name)}</a></h2>
          <span class="cart-item__unit">${PRICE_FMT.format(line.price)} each</span>
          <div class="cart-item__controls">
            <div class="qty" aria-label="Quantity">
              <button type="button" class="qty__btn" data-dec aria-label="Decrease quantity">−</button>
              <span class="qty__value" data-qty>${line.qty}</span>
              <button type="button" class="qty__btn" data-inc aria-label="Increase quantity">+</button>
            </div>
            <button type="button" class="cart-item__remove" data-remove>Remove</button>
          </div>
        </div>
        <div class="cart-item__right">
          <span class="cart-item__line-total" data-line-total>${lineTotal}</span>
        </div>`;
    }

    function render() {
      const items = getCart();
      if (!items.length) { renderEmpty(); return; }

      const layout = document.createElement("div");
      layout.className = "cart-layout";

      const list = document.createElement("div");
      list.className = "cart-items";
      items.forEach((line) => {
        const row = document.createElement("div");
        row.className = "cart-item";
        row.dataset.id = line.id;
        row.innerHTML = itemRow(line);
        row.querySelector("[data-dec]").addEventListener("click", () => { updateQty(line.id, line.qty - 1); render(); });
        row.querySelector("[data-inc]").addEventListener("click", () => { updateQty(line.id, line.qty + 1); render(); });
        row.querySelector("[data-remove]").addEventListener("click", () => { removeFromCart(line.id); render(); });
        list.appendChild(row);
      });

      const subtotal = getCartTotal();
      const summary = document.createElement("aside");
      summary.className = "cart-summary";
      summary.innerHTML = `
        <p class="cart-summary__title">Order summary</p>
        <div class="cart-summary__row"><span>Subtotal</span><span>${PRICE_FMT.format(subtotal)}</span></div>
        <div class="cart-summary__row"><span>Shipping</span><span>Calculated at checkout</span></div>
        <div class="cart-summary__row cart-summary__row--total"><span>Total</span><span>${PRICE_FMT.format(subtotal)}</span></div>
        <div class="cart-summary__actions">
          <button type="button" class="btn btn--primary btn--block" data-proceed>Proceed to checkout</button>
        </div>
        <div data-checkout-mount></div>`;

      layout.appendChild(list);
      layout.appendChild(summary);
      root.replaceChildren(layout);

      // Hand the proceed button + mount point to checkout.js.
      initCheckout({
        trigger: summary.querySelector("[data-proceed]"),
        mount: summary.querySelector("[data-checkout-mount]"),
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadNav();
      loadSettings();
      loadFooter();
      render();
    });
  </script>

</body>
</html>
