<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2B3E1E" />

  <title>Journal | A Case for Wisdom</title>
  <meta name="description" content="Essays, reflections, and letters on wisdom, faith, and scripture." />

  <link rel="canonical" href="https://acaseforwisdom.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Journal | A Case for Wisdom" />
  <meta property="og:description" content="Essays, reflections, and letters on wisdom, faith, and scripture." />
  <meta property="og:image" content="/assets/images/og-image.jpg" />
  <meta property="og:url" content="https://acaseforwisdom.com/" />
  <meta property="og:site_name" content="A Case for Wisdom" />
  <meta property="og:locale" content="en_CA" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Journal — A Case for Wisdom" />
  <meta name="twitter:description" content="Essays, reflections, and letters on wisdom, faith, and scripture." />
  <meta name="twitter:image" content="/assets/images/og-image.jpg" />

  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/images/og-image.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/global.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/blog.css" />
</head>

<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ============================================================
       NAV
       ============================================================ -->
  <header class="nav" role="banner">
    <div class="nav__inner">
      <a class="nav__brand" href="/" aria-label="A Case for Wisdom — Home">
        <svg class="nav__logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.25" opacity="0.55"/>
          <path d="M32 14 V50" stroke="currentColor" stroke-width="1.25" fill="none"/>
          <path d="M32 22 Q24 24 22 32" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M32 22 Q40 24 42 32" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M32 30 Q26 32 24 40" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M32 30 Q38 32 40 40" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M14 50 Q22 46 32 50 T 50 50" stroke="#B8953A" stroke-width="1.25" fill="none"/>
        </svg>
        <span class="nav__brand-text" data-site-name></span>
      </a>

      <nav class="nav__links" aria-label="Primary" data-nav-links></nav>

      <div class="nav__actions">
        <a class="nav__cart" href="/cart/" aria-label="Cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M3 5h2l2.4 11.2A2 2 0 0 0 9.36 18h8.28a2 2 0 0 0 1.96-1.6L21 9H6"/>
            <circle cx="10" cy="21" r="1.2"/>
            <circle cx="18" cy="21" r="1.2"/>
          </svg>
          <span class="nav__cart-count" data-cart-count hidden>0</span>
        </a>

        <button class="nav__toggle" type="button" aria-expanded="false" aria-controls="mobile-drawer" data-nav-toggle>
          <span class="sr-only">Open menu</span>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="nav__drawer" id="mobile-drawer" data-open="false" aria-hidden="true">
      <a class="nav__link" href="/cart/">Cart</a>
    </div>
  </header>

  <main id="main" class="journal-page">

    <!-- Page header -->
    <header class="journal-header">
      <h1 class="journal-title">Journal</h1>
      <p class="journal-subtitle" data-journal-description>
        Essays, reflections, and letters on wisdom, faith, and scripture.
      </p>
    </header>

    <!-- Category filter -->
    <ul class="filter-tabs" data-filter-tabs role="tablist" aria-label="Filter essays by category">
      <li><button class="filter-tab is-active" data-category="all" role="tab" aria-selected="true" type="button">All</button></li>
      <li><button class="filter-tab" data-category="Essay" role="tab" aria-selected="false" type="button">Essay</button></li>
      <li><button class="filter-tab" data-category="Reflection" role="tab" aria-selected="false" type="button">Reflection</button></li>
      <li><button class="filter-tab" data-category="Letter" role="tab" aria-selected="false" type="button">Letter</button></li>
      <li><button class="filter-tab" data-category="Study" role="tab" aria-selected="false" type="button">Study</button></li>
    </ul>

    <!-- Search -->
    <div class="journal-search">
      <label class="sr-only" for="journal-search-input">Search the journal</label>
      <input
        type="search"
        id="journal-search-input"
        class="journal-search-input"
        placeholder="Search the journal…"
        autocomplete="off"
        data-journal-search
      />
      <p class="journal-search-count" data-search-count hidden></p>
    </div>

    <!-- Articles -->
    <section aria-live="polite">
      <ul class="article-list" data-posts-grid>
        <!-- populated by script -->
      </ul>

      <nav class="pagination" data-pagination aria-label="Pagination" hidden>
        <a class="pagination__link" data-page-prev href="#">← Older letters</a>
        <span class="pagination__current" data-page-current>Page 1</span>
        <a class="pagination__link" data-page-next href="#">Newer letters →</a>
      </nav>
    </section>

    <!-- Newsletter -->
    <section class="newsletter-section" aria-labelledby="newsletter-heading">
      <h2 class="newsletter-section__heading" id="newsletter-heading">Get new essays by email</h2>
      <p class="newsletter-section__sub">No spam. Unsubscribe anytime.</p>
      <form class="newsletter-section__form" data-newsletter novalidate>
        <label class="sr-only" for="newsletter-email">Email address</label>
        <input
          type="email"
          id="newsletter-email"
          class="newsletter-section__input"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
          data-newsletter-input
        />
        <button type="submit" class="btn btn--ghost" data-newsletter-btn>Subscribe</button>
      </form>
      <p class="newsletter-section__msg" data-newsletter-msg role="status" aria-live="polite"></p>
    </section>

  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand-block">
        <div class="footer__brand" data-site-name></div>
        <p class="footer__tagline" data-footer-tagline></p>
      </div>
      <nav class="footer__links" aria-label="Footer">
        <a class="footer__link" href="/">Journal</a>
        <a class="footer__link" href="/about.html">About</a>
        <a class="footer__link" href="/shop/">Shop</a>
        <a class="footer__link" data-social="instagram" href="#" rel="noopener" hidden>Instagram</a>
      </nav>
    </div>

    <div class="footer__bottom">
      <span>© <span data-year>2026</span> <span data-site-name></span> — <span data-footer-copy></span></span>
      <span>All prices in CAD.</span>
    </div>
  </footer>

  <!-- Mobile drawer -->
  <script type="module">
    document.querySelector("[data-year]").textContent = new Date().getFullYear();

    const toggle = document.querySelector("[data-nav-toggle]");
    const drawer = document.getElementById("mobile-drawer");
    if (toggle && drawer) {
      toggle.addEventListener("click", () => {
        const open = drawer.getAttribute("data-open") === "true";
        drawer.setAttribute("data-open", String(!open));
        drawer.setAttribute("aria-hidden", String(open));
        toggle.setAttribute("aria-expanded", String(!open));
      });
    }
  </script>

  <!-- Journal page logic -->
  <script type="module">
    import { loadNav, loadFooter, loadSettings } from "/assets/js/site.js";
    import { renderJournalIndex } from "/assets/js/blog.js";
    import { subscribe } from "/assets/js/lib/api.js";

    document.addEventListener("DOMContentLoaded", () => {
      loadNav();
      loadSettings();
      loadFooter();
      renderJournalIndex({
        grid: document.querySelector("[data-posts-grid]"),
        pagination: document.querySelector("[data-pagination]"),
        currentLabel: document.querySelector("[data-page-current]"),
        prevLink: document.querySelector("[data-page-prev]"),
        nextLink: document.querySelector("[data-page-next]"),
        filterTabs: document.querySelectorAll("[data-filter-tabs] .filter-tab"),
        searchInput: document.querySelector("[data-journal-search]"),
        searchCount: document.querySelector("[data-search-count]"),
      });

      // ── Newsletter signup ───────────────────────────────────────
      const form = document.querySelector("[data-newsletter]");
      if (form) {
        const input = form.querySelector("[data-newsletter-input]");
        const btn = form.querySelector("[data-newsletter-btn]");
        const msg = document.querySelector("[data-newsletter-msg]");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = (input.value || "").trim();
          msg.classList.remove("is-error");
          if (!email || !input.checkValidity()) {
            msg.textContent = "Please enter a valid email address.";
            msg.classList.add("is-error");
            return;
          }
          btn.disabled = true;
          try {
            await subscribe(email);
            form.hidden = true;
            msg.textContent = "Thank you. Watch your inbox.";
          } catch (err) {
            btn.disabled = false;
            msg.textContent = "Something went wrong — please try again in a moment.";
            msg.classList.add("is-error");
          }
        });
      }
    });
  </script>

</body>
</html>
